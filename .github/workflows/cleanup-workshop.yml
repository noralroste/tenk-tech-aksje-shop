name: Cleanup expired workshop instances

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch:
    inputs:
      suspend_all:
        description: "Suspend all workshop instances immediately (ignore expiry)"
        required: false
        default: false
        type: boolean

jobs:
  cleanup:
    name: Suspend expired instances
    runs-on: ubuntu-latest
    steps:
      - name: Check and suspend expired services
        run: |
          echo "## :broom: Workshop cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SERVICES=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services?limit=20" | jq -c '.[]')

          NOW=$(date -u +%s)

          echo "$SERVICES" | while read -r entry; do
            SERVICE_NAME=$(echo "$entry" | jq -r '.service.name')
            SERVICE_ID=$(echo "$entry" | jq -r '.service.id')

            # Only touch workshop instances
            if [[ "$SERVICE_NAME" != aksje-shop-gruppe-* ]]; then
              continue
            fi

            if [ "${{ inputs.suspend_all }}" = "true" ]; then
              echo "Suspending ${SERVICE_NAME} (manual)"
              curl -s --fail-with-body -X POST \
                -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                "https://api.render.com/v1/services/${SERVICE_ID}/suspend"
              echo "- :white_check_mark: **${SERVICE_NAME}** suspended (manual)" >> $GITHUB_STEP_SUMMARY
              continue
            fi

            # Get EXPIRES_AT env var
            EXPIRES_AT=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/env-vars" \
              | jq -r '.[] | select(.envVar.key == "EXPIRES_AT") | .envVar.value // empty')

            if [ -z "$EXPIRES_AT" ]; then
              echo "Suspending ${SERVICE_NAME}: no expiry set"
              curl -s --fail-with-body -X POST \
                -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                "https://api.render.com/v1/services/${SERVICE_ID}/suspend"
              echo "- :white_check_mark: **${SERVICE_NAME}** suspended (no expiry set)" >> $GITHUB_STEP_SUMMARY
              continue
            fi

            EXPIRES_EPOCH=$(date -u -d "$EXPIRES_AT" +%s 2>/dev/null || echo 0)

            if [ "$NOW" -gt "$EXPIRES_EPOCH" ]; then
              echo "Suspending expired service: $SERVICE_NAME (expired: $EXPIRES_AT)"
              curl -s --fail-with-body -X POST \
                -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                "https://api.render.com/v1/services/${SERVICE_ID}/suspend"
              echo "- :white_check_mark: **${SERVICE_NAME}** suspended (expired ${EXPIRES_AT})" >> $GITHUB_STEP_SUMMARY
            else
              echo "- :clock1: **${SERVICE_NAME}** expires ${EXPIRES_AT}" >> $GITHUB_STEP_SUMMARY
            fi
          done
